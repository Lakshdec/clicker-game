<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Clicker Game</title>
    
    <!-- Using the absolute latest PyScript links -->
    <link rel="stylesheet" href="https://pyscript.net">
    <script type="module" src="https://pyscript.net"></script>

    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f8ff; padding-top: 50px; }
        #click-btn { 
            padding: 20px 40px; font-size: 25px; cursor: pointer; 
            background-color: #2196F3; color: white; border: none; border-radius: 12px;
        }
        #score-display { font-size: 50px; margin: 20px; color: #0D47A1; }
        #loading-text { color: #666; font-style: italic; }
    </style>
</head>
<body>

    <h1>My Python Clicker</h1>
    <div id="score-display">0</div>
    <button id="click-btn">CLICK ME!</button>
    <p id="loading-text">Loading Python... please wait...</p>

    <!-- This "config" block tells the browser to go grab your main.py file -->
    <script type="py" src="./main.py" config='{"files": ["main.py"]}'></script>

</body>
</html>
