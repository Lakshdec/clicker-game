<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Python Clicker</title>
    <!-- Stable 2025/2026 PyScript Links -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.2.4/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.2.4/core.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #e3f2fd; padding-top: 100px; }
        #click-btn { padding: 20px 40px; font-size: 24px; cursor: pointer; background: #1976d2; color: white; border: none; border-radius: 12px; }
        #score-display { font-size: 60px; color: #0d47a1; margin: 20px; }
    </style>
</head>
<body>
    <h1>Clicker Game</h1>
    <div id="score-display">0</div>
    <button id="click-btn">CLICK!</button>
    <p id="status">Starting Python...</p>

    <!-- This fetches your file from GitHub -->
    <script type="py" src="./main.py" config='{"files": ["main.py"]}'></script>
</body>
</html>
